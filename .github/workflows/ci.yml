name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -U pip
      - name: Install dev deps
        run: python -m pip install -e .[dev]
      - name: Lint
        run: python -m ruff check .
      - name: Run tests
        run: python -m pytest -q

      - name: Initialize BinaryByte (CI)
        if: github.event_name == 'pull_request'
        run: binarybyte init .

      - name: BinaryByte eval (PR gate)
        if: github.event_name == 'pull_request'
        env:
          BB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: binarybyte eval run --git-range "$BB_BASE_SHA...$BB_HEAD_SHA" --version "pr-${{ github.event.pull_request.number }}"

  build-and-publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build tools
        run: python -m pip install --upgrade pip build twine
      - name: Build dist
        run: python -m build
      - name: Validate dist
        run: python -m twine check dist/*
      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
