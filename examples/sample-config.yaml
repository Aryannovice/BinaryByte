version: '1'

agents:
  targets:
    - cursor
    - gemini-cli
    - claude-code
    - windsurf
    - copilot

eval:
  safety:
    denied_commands:
      - rm -rf /
      - DROP TABLE
      - FORMAT
      - ':(){:|:&};:'
    denied_paths:
      - .env
      - secrets/
      - .git/
    scan_secrets: true
    secret_patterns: []  # empty = use built-in defaults

  sandbox:
    enabled: false  # set true to enable Docker sandbox evaluation
    image: python:3.11-slim
    timeout_seconds: 120
    commands:
      - pytest -q

state:
  conventions:
    - Use pytest for all tests
    - Use Pydantic for data models
    - Follow PEP 8 style guidelines
