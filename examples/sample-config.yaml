version: '1'

agents:
  targets:
    - cursor
    - gemini-cli

eval:
  safety:
    denied_commands:
      - rm -rf /
      - DROP TABLE
      - FORMAT
      - ':(){:|:&};:'
    denied_paths:
      - .env
      - secrets/
      - .git/

state:
  conventions:
    - Use pytest for all tests
    - Use Pydantic for data models
    - Follow PEP 8 style guidelines
